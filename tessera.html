<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TESSERA — autotile proofing bench</title>
<style>
  :root {
    --bg0: #1e1e1e; --bg1: #2a2a2a; --panel: #292929; --line: #3f3f3f;
    --text: #d6d6d6; --dim: #8f8f8f; --accent: #e8e8e8;
  }
  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  html, body { margin: 0; height: 100dvh; overflow: hidden; overscroll-behavior: none;
    background: radial-gradient(circle at 30% -10%, var(--bg1) 0%, var(--bg0) 60%);
    color: var(--text); font-family: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace; font-size: 13px; }
  body { display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 10px; padding: 8px 12px 6px; flex-wrap: wrap; flex: 0 0 auto; }
  header h1 { font-size: 15px; margin: 0 4px 0 0; letter-spacing: 4px; color: var(--accent); font-weight: 700; }
  .spacer { flex: 1; }
  .tab { background: none; border: 1px solid var(--line); border-bottom-width: 3px; color: var(--dim);
    border-radius: 8px; padding: 8px 14px; font: inherit; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; }
  .tab svg { width: 20px; height: 20px; }
  .tab.on { color: var(--accent); border-color: var(--accent); background: var(--panel); }

  .ibtn { background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 8px;
    width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; flex: 0 0 auto; }
  .ibtn svg { width: 20px; height: 20px; }
  .ibtn:active { background: var(--line); }
  .ibtn.on { border-color: var(--accent); color: var(--accent); background: #383838; box-shadow: 0 0 0 1px var(--accent) inset; }
  .ctx { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .vsep { width: 1px; height: 26px; background: var(--line); margin: 0 3px; }
  select.pal { background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; height: 38px; padding: 0 8px; font: inherit; max-width: 130px; }

  .lbl { color: var(--dim); font-size: 10px; letter-spacing: 1px; }
  .sw { width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; position: relative; padding: 0; flex: 0 0 auto; }
  .sw.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  .sw .tag { position: absolute; right: 1px; bottom: 0; font-size: 8px; color: #000; background: #ffffffb0; border-radius: 3px; padding: 0 2px; line-height: 10px; }
  .bgo { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--line); cursor: pointer; padding: 0; flex: 0 0 auto; }
  .bgo.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  .bgo[data-bg="dark"] { background: conic-gradient(#232323 25%, #2c2c2c 0 50%, #232323 0 75%, #2c2c2c 0); background-size: 12px 12px; }
  .bgo[data-bg="black"] { background: #000; }
  .bgo[data-bg="light"] { background: conic-gradient(#fff 25%, #cbcbcb 0 50%, #fff 0 75%, #cbcbcb 0); background-size: 12px 12px; }
  .bgo[data-bg="ink"] { background: #191919; }
  .bgo[data-bg="coal"] { background: #0c0c0c; }
  #bgCurrent { margin-top: auto; }   /* pinned to the rail's bottom, clear of the tools */
  #bgMenu { position: fixed; z-index: 70; display: none; flex-direction: column; gap: 6px;
    background: rgba(18,18,18,.96); border: 1px solid #454545; border-radius: 10px; padding: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #colorCurrent { width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; padding: 0; flex: 0 0 auto; }
  #colorCurrent.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  #colorMenu { position: fixed; right: 12px; z-index: 70; display: none; flex-direction: column; align-items: center; gap: 8px; width: 340px; max-width: 92vw;
    background: rgba(18,18,18,.96); border: 1px solid #454545; border-radius: 10px; padding: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #colorMenu .cmRow { display: flex; gap: 6px; align-items: center; }
  #colorMenu .cmRow > .lbl { flex: 0 0 52px; }
  /* WebKit sizes wrap-enabled flex rows at min-content inside fixed-position
     shrink-to-fit, tucking the last swatch under. Five stops never need to
     wrap, so forbid it; IN FILE keeps wrapping for its variable count. */
  #stopSwatches { flex-wrap: nowrap; }
  #brushMenu { position: fixed; right: 12px; z-index: 70; display: none; flex-direction: column; align-items: center; gap: 8px; width: 300px; max-width: 92vw;
    background: rgba(18,18,18,.96); border: 1px solid #454545; border-radius: 10px; padding: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #brushMenu .cmRow { display: flex; gap: 8px; align-items: center; }
  #brushMenu .cmRow > .lbl { flex: 0 0 52px; }
  #brushMenu input[type="range"] { width: 150px; accent-color: var(--accent); }
  #brushSizeVal { flex: 0 0 24px; text-align: right; font-size: 12px; color: var(--text); }
  .bshape { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .bshape.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  .bshape .bsq { width: 16px; height: 16px; background: var(--accent); }
  .bshape .bci { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); }
  #selbar { display: none; flex-direction: column; gap: 6px; align-items: center; padding: 6px 12px; flex: 0 0 auto;
    background: #1a1a1a; border-top: 1px solid var(--line); }
  .selrow { display: flex; gap: 6px; align-items: center; }
  #cellbar { display: none; gap: 6px; align-items: center; justify-content: center; padding: 6px 12px; flex: 0 0 auto;
    background: #1a1a1a; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .fly { position: relative; display: inline-flex; }
  #optbar { display: none; gap: 6px; align-items: center; justify-content: center; padding: 6px 12px; flex: 0 0 auto;
    background: #1a1a1a; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .optline { background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 6px; height: 32px;
    padding: 0 12px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font: inherit; font-size: 10px; letter-spacing: 1px; }
  .optline svg { width: 16px; height: 16px; }
  .optline:active { background: var(--line); }
  .optItem { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; width: 66px;
    padding: 8px 4px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; font: inherit; font-size: 10px; letter-spacing: 1px; color: var(--text); }
  .optItem svg { width: 20px; height: 20px; }
  .optItem .olbl { color: var(--dim); }
  .optItem:active { background: var(--line); }
  #loupe { position: fixed; z-index: 90; width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid #fff; box-shadow: 0 2px 12px rgba(0,0,0,.6), inset 0 0 0 1px rgba(0,0,0,.35);
    display: none; pointer-events: none; transform: translate(-50%, -115%); }
  #btnConvert, #btnDeselect, #btnCopy, #btnPaste { background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 6px;
    height: 28px; padding: 0 10px; font: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer; flex: 0 0 auto; }
  #btnConvert:active, #btnDeselect:active, #btnCopy:active, #btnPaste:active { background: var(--line); }

  #stage { display: flex; flex: 1 1 auto; min-height: 0; }
  #rail { display: flex; flex-direction: column; gap: 6px; padding: 0 8px 8px 12px; align-items: center; overflow-y: auto; flex: 0 0 auto; }
  #rail .hsep { width: 26px; height: 1px; background: var(--line); margin: 3px 0; flex: 0 0 auto; }

  #viewport { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; touch-action: none;
    background: var(--bg0); border: 1px solid var(--line); border-radius: 10px 0 0 0; }
  #screen, #gridOverlay { position: absolute; left: 0; top: 0; }
  #gridOverlay { pointer-events: none; }
  #statusChip { position: absolute; left: 10px; bottom: 10px; background: #292929ee; border: 1px solid var(--line);
    border-radius: 7px; padding: 5px 10px; color: var(--dim); font-size: 11px; max-width: 70%;
    opacity: 0; transition: opacity .35s; pointer-events: none; }
  #statusChip.show { opacity: 1; }
  #ver { position: absolute; right: 8px; bottom: 6px; color: var(--dim); font-size: 10px; opacity: .75; pointer-events: none; letter-spacing: 1px; }
  #tip { position: fixed; z-index: 99; background: #2f2f2fee; border: 1px solid var(--line); border-radius: 6px;
    padding: 5px 8px; color: var(--text); font-size: 11px; max-width: 250px; pointer-events: none; display: none; line-height: 1.45; }
</style>
</head>
<body>
<header>
  <h1>TESSERA</h1>
  <button class="tab on" data-tab="ed" data-icon="grid" title="Template — the tile sheet"></button>
  <button class="tab" data-tab="pv" data-icon="mountain" title="Level — editable mock level; the only tab with tile and slope tools"></button>
  <button class="tab" data-tab="zoo" data-icon="puzzle" title="Zoo — generated coverage: every blob mask + all twelve slope stamps"></button>
  <select class="pal" id="ctSelect" title="Terrain sheet format — 3&times;3 is the current production ATLAS/Godot contract; 4&times;4 adds parity edge pairs and depth bands (TESSERA-only until the ATLAS port)">
    <option value="v1">3&times;3</option>
    <option value="v2">4&times;4</option>
    <option value="v3">5&times;5</option>
  </select>
  <button class="ibtn" id="btnOptions" data-icon="wrench" title="Options — template canvas, export, import, and reset"></button>
  <div class="ctx" id="ctxLevel" style="display:none">
    <span class="vsep"></span>
    <button class="ibtn pvmode on" data-pvmode="pixels" data-icon="brush" title="Pixels — draw here with the template tools; edits land in the template cell each tile came from"></button>
    <button class="ibtn pvmode" data-pvmode="cells" data-icon="layout" title="Cells — paint or erase whole terrain cells"></button>
  </div>
  <span class="spacer"></span>
  <span class="fly"><button class="ibtn" id="btnBrush" data-icon="brush" title="Brush — size and shape, shared by pencil and eraser"></button>
  <!-- Brush flyout: pixel size + stamp shape, shared by pencil and eraser -->
  <div id="brushMenu">
    <div class="cmRow"><span class="lbl">SIZE</span><input type="range" id="brushSizeSlider" min="1" max="16" step="1" value="1"><span id="brushSizeVal">1</span></div>
    <div class="cmRow"><span class="lbl">SHAPE</span>
      <button class="bshape on" data-bshape="square" title="Square brush"><span class="bsq"></span></button>
      <button class="bshape" data-bshape="circle" title="Circle brush"><span class="bci"></span></button>
    </div>
  </div></span>
  <span class="fly"><button id="colorCurrent" title="Current color — tap for stops, file colors, and the zone palette"></button>
  <!-- Color flyout: display-mapped palette; template stays grayscale truth -->
  <div id="colorMenu">
    <div class="cmRow"><span class="lbl">STOPS</span><span class="ctx" id="stopSwatches"></span></div>
    <div class="cmRow" id="rowInFile"><span class="lbl">IN FILE</span><span class="ctx" id="fileSwatches"></span><button id="btnConvert" title="Snap every template pixel to its nearest stop gray (20, 52, 139, 200, 255) — one undoable step; this row disappears once the file conforms">CONVERT</button></div>
    <div class="cmRow"><span class="lbl">PALETTE</span><select class="pal" id="palSelect" title="Zone palette — the same gradient map the game uses, shown app-wide; the template stays grayscale underneath"></select></div>
  </div></span>
  <input type="file" id="fileTpl" accept="image/png" hidden>
</header>

<!-- Options tray: template file + canvas operations, one line each.
     Toggled by the wrench; actions close it. -->
<div id="optbar">
  <button class="optline" id="btnReload" title="Reload the app — fetches the latest deployed version (cache-busting), for pinned home-screen installs"><span data-icon="reload"></span>Reload</button>
  <button class="optline" id="btnResetArt" title="Reset the template art to the shipped original (asks first)"><span data-icon="history"></span>Reset</button>
  <button class="optline" id="btnCanvas" title="Resize the sheet — drag the right/bottom handles in 16px cells; cannot shrink below the contract's base cells"><span data-icon="frame"></span>Canvas</button>
  <button class="optline" id="btnLoad" title="Load a template PNG"><span data-icon="sqplus"></span>Import</button>
  <button class="optline" id="btnSave" title="Save autotile_template.png"><span data-icon="share"></span>Export</button>
</div>

<!-- Cells sub-row: tools and layout operations for cell-terrain editing.
     Lives under the header, only while the Level tab is in Cells mode. -->
<div id="cellbar">
  <button class="ibtn ptool on" data-ptool="paint" data-icon="sqplus" title="Paint terrain cells"></button>
  <button class="ibtn tool" data-tool="slopeF" data-icon="slopeF" title="Draw FLOOR slope: drag from one end to the other — height sets the steps, width picks the gradient (1:1, 2:1, 3:1). Tap a drawn slope to remove it; tap an empty inside corner to drop a 45° connector."></button>
  <button class="ibtn tool" data-tool="slopeC" data-icon="slopeC" title="Draw CEILING slope: drag from one end to the other. Tap a drawn slope to remove it; tap an empty inside corner to drop a 45° connector."></button>
  <button class="ibtn ptool" data-ptool="erase" data-icon="eraser" title="Erase terrain cells — erasing any cell of a slope removes that whole run"></button>
  <span class="vsep"></span>
  <button class="ibtn" id="btnLayoutSave" data-icon="download" title="Save this layout as a JSON file — share it or load it on another device"></button>
  <button class="ibtn" id="btnLayoutLoad" data-icon="upload" title="Load a layout JSON file"></button>
  <button class="ibtn" id="btnReset" data-icon="rotate" title="Reset the Playfield cell layout to the default mock arrangement (asks first)"></button>
  <button class="ibtn" id="btnRulesReset" data-icon="sqx" title="Delete ALL taught rules for this format — back to pure resolver defaults (asks first)"></button>
</div>

<!-- BG flyout — opened by the swatch at the bottom of the rail; order per James:
     light checkers, dark checkers, palette-darkest #191919, black -->
<div id="bgMenu">
  <button class="bgo" data-bg="light" title="Classic light checkerboard"></button>
  <button class="bgo" data-bg="dark" title="Dark checkerboard"></button>
  <button class="bgo" data-bg="ink" title="Palette darkest — #191919"></button>
  <button class="bgo" data-bg="coal" title="5% black — #0C0C0C"></button>
  <button class="bgo" data-bg="black" title="Solid black"></button>
</div>

<!-- Eyedropper loupe: appears while a hold-pick is engaged, tracks the
     finger, shows the sampled color through the active palette -->
<div id="loupe"></div>

<div id="stage">
  <div id="rail">
    <button class="ibtn tool on" data-tool="pencil" data-icon="pencil" title="Pencil (B) — draw, then hold still to snap the stroke to a straight line; keep holding to adjust, release to place"></button>
    <button class="ibtn tool" data-tool="eraser" data-icon="eraser" title="Eraser (E) — hold still mid-stroke to snap to a straight erase line"></button>
    <button class="ibtn tool" data-tool="marquee" data-icon="marquee" title="Marquee select (Template) — freehand/polygon, rectangle, or ellipse; Additive and Removal modes in the bottom bar"></button>
    <button class="ibtn tool" data-tool="selmove" data-icon="move" title="Move — lifts the current selection so it can be dragged; flips and 90° rotation in the bottom bar. Switching to any other tool drops it in place."></button>
    <button class="ibtn tool" data-tool="fill" data-icon="bucket" title="Fill — bounded to the 16px template cell (G)"></button>
    <button class="ibtn tool" data-tool="pick" data-icon="pipette" title="Eyedropper (I)"></button>
    <button class="ibtn tool" data-tool="revise" data-icon="stamp" title="Revise tile — tap any filled LEVEL cell and type the template coordinate (A1..J12) plus flip/rotation. Teaches a tileset rule (masks for terrain, roles for slopes) that cascades everywhere and is remembered."></button>

    <div class="hsep"></div>
    <button class="ibtn" id="btnUndo" data-icon="undo" title="Undo (Cmd/Ctrl+Z)"></button>
    <button class="ibtn" id="btnRedo" data-icon="redo" title="Redo (Shift+Cmd/Ctrl+Z)"></button>
    <div class="hsep"></div>
    <button class="ibtn on" id="btnFinger" data-icon="hand" title="Finger drawing — when off: one finger hold-picks color, two fingers pan/zoom (auto-disabled when an Apple Pencil is detected)"></button>
    <div class="hsep"></div>
    <button class="ibtn on" id="btnCellGrid" data-icon="grid" title="16px cell/tile grid for the current view"></button>
    <button class="ibtn" id="btnPxGrid" data-icon="dots" title="1px pixel grid for the current view (visible when zoomed in)"></button>
    <button class="ibtn" id="btnRoles" data-icon="tag" title="Label special template cells: E = open-end slope cap (used when a run ends into air), C = dedicated ceiling stamps (surface/underlay)"></button>
    <button class="ibtn" id="btnCoords" data-icon="grid" title="Show template coordinates (A1..J12) — on every template cell, and on every level/zoo tile (the tile it resolved to)"></button>
    <div class="hsep"></div>
    <button class="ibtn" id="btnFit" data-icon="fit" title="Fit to screen"></button>
    <button class="bgo" id="bgCurrent" data-bg="dark" title="Canvas background — tap to choose"></button>
  </div>
  <div id="revPanel" style="position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:60;display:none;background:rgba(18,18,18,.96);border:1px solid #454545;border-radius:12px;padding:10px 12px;box-shadow:0 8px 30px rgba(0,0,0,.5)">
    <div id="revTitle" style="font-size:12px;color:#9a9a9a;margin-bottom:4px"></div>
    <div id="revInfo" style="font-size:11px;color:#8fb996;margin-bottom:8px;max-width:340px;display:none"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <input id="revCoord" type="text" maxlength="3" autocapitalize="characters" autocomplete="off" placeholder="C10" style="width:3.6em;background:#111;border:1px solid #454545;border-radius:8px;color:#eee;padding:6px 8px;font:inherit;text-transform:uppercase;text-align:center">
      <button class="ibtn" id="revH" title="Mirror horizontally" style="font-size:12px;width:34px">H</button>
      <button class="ibtn" id="revV" title="Mirror vertically" style="font-size:12px;width:34px">V</button>
      <button class="ibtn" id="revRot" title="Rotation (tap to cycle 0/90/180/270)" style="font-size:12px;width:44px">0&deg;</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
      <button class="ibtn" id="revClear" title="Remove the manual assignment" style="font-size:12px;padding:0 10px;width:auto">Clear</button>
      <button class="ibtn" id="revApply" title="Apply" style="font-size:12px;padding:0 10px;width:auto">Apply</button>
      <button class="ibtn" id="revClose" title="Close" style="font-size:12px;padding:0 10px;width:auto">Close</button>
    </div>
  </div>
  <div id="viewport">
    <canvas id="screen"></canvas>
    <canvas id="gridOverlay"></canvas>
    <div id="statusChip"></div>
    <div id="ver"></div>
  </div>
</div>

<!-- Selection options bar (bottom): shapes on top, modes + deselect below.
     Visible only while the marquee tool is active on the Template tab. -->
<div id="selbar">
  <div class="selrow" id="selrowSelect">
    <button class="ibtn selshape on" data-selshape="lasso" data-icon="lasso" title="Freehand / polygon — drag to lasso (auto-closes on release); tap to place polygon points, then tap the origin marker to close"></button>
    <button class="ibtn selshape" data-selshape="rect" data-icon="selrect" title="Rectangle — drag corner to corner"></button>
    <button class="ibtn selshape" data-selshape="ellipse" data-icon="selellipse" title="Ellipse — drag the bounding box"></button>
    <span class="vsep"></span>
    <button class="ibtn selmode on" data-selmode="add" data-icon="plus" title="Additive — new shapes extend the selection"></button>
    <button class="ibtn selmode" data-selmode="sub" data-icon="minus" title="Removal — new shapes carve out of the selection"></button>
    <span class="vsep"></span>
    <button id="btnDeselect" title="Clear the selection (and any in-progress polygon)">DESELECT</button>
    <span class="vsep"></span>
    <button id="btnCopy" title="Copy the selected pixels to the clipboard (Cmd/Ctrl+C)">COPY</button>
    <button id="btnPaste" title="Paste in place as a floating selection, ready to move (Cmd/Ctrl+V)">PASTE</button>
  </div>
  <div class="selrow" id="selrowMove" style="display:none">
    <button class="optItem" id="btnFlipH" title="Flip the floating selection horizontally"><span data-icon="flipH"></span><span class="olbl">Flip H</span></button>
    <button class="optItem" id="btnFlipV" title="Flip the floating selection vertically"><span data-icon="flipV"></span><span class="olbl">Flip V</span></button>
    <button class="optItem" id="btnRot90" title="Rotate the floating selection 90° clockwise — lossless; four taps return to start"><span data-icon="rot90"></span><span class="olbl">Rotate 90°</span></button>
  </div>
</div>

<script>
/*__PURE_START__*/
/* ============================================================
   Dual terrain contracts. Each contract is pure data; one resolver
   reads whichever is active.
     v1 — 3x3 main block, 10x11 sheet (160x176). The CURRENT ATLAS/Godot
          contract: production-accurate today.
     v2 — 4x4 main block, 10x12 sheet (160x192). Parity edge pairs +
          rim/deep interior. NOT YET IN ATLAS — preview only until the
          bake is ported and Godot terrain registration is re-run.
   Cell addresses are IDENTITY within a contract — art may change,
   addresses may not.
   Bit order (clockwise from N): N=1 NE=2 E=4 SE=8 S=16 SW=32 W=64 NW=128.
   A diagonal counts only when both of its adjacent cardinals are filled.
   ============================================================ */
const TILE = 16;
const GCOLS = 44, GROWS = 26;                    // mock level grid

const CONTRACTS = {
  v1: {
    id: "v1", label: "3\u00d73 terrain", TCOLS: 10, TROWS: 11,
    filename: "autotile_template.png", lsKey: "tessera.png",
    LOOKUP: {
      0:{ax:3,ay:3},1:{ax:3,ay:2},4:{ax:0,ay:3},5:{ax:4,ay:6},7:{ax:0,ay:2},
      16:{ax:3,ay:0},17:{ax:3,ay:1},20:{ax:4,ay:4},21:{ax:4,ay:5},23:{ax:0,ay:4},
      28:{ax:0,ay:0},29:{ax:0,ay:5},31:{ax:0,ay:1},64:{ax:2,ay:3},65:{ax:6,ay:6},
      68:{ax:1,ay:3},69:{ax:5,ay:6},71:{ax:3,ay:5},80:{ax:6,ay:4},81:{ax:6,ay:5},

const TERR_SLOPE_KEYS = { "1,asc":"slope_45_asc","1,desc":"slope_45_desc","2,asc":"slope_2to1_asc","2,desc":"slope_2to1_desc","3,asc":"slope_3to1_asc","3,desc":"slope_3to1_desc" };

const terrCanonicalMask = (n, ne, e, se, s, sw, w, nw) => {
  let m = 0;
  if (n) m |= 1; if (ne && n && e) m |= 2; if (e) m |= 4; if (se && s && e) m |= 8;
  if (s) m |= 16; if (sw && s && w) m |= 32; if (w) m |= 64; if (nw && n && w) m |= 128;
  return m;
};
const terrHash01 = (x, y) => {
  let h = (x * 374761393 + y * 668265263) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  h ^= h >>> 16;
  return (h >>> 0) / 4294967296;
};
const terrPickDeep = (x, y, variants) => {
  const total = variants.reduce((s, v) => s + v.weight, 0);
  let r = terrHash01(x, y) * total;
  for (const v of variants) { if ((r -= v.weight) < 0) return { ax: v.ax, ay: v.ay }; }
  const v = variants[0]; return { ax: v.ax, ay: v.ay };
};

const K = (c, r) => c + "," + r;

/* Geometric role of a slope cell — the teach/rule key (v5.5):
   face:runKey:direction:part(:end:XY[ZW]). Direction-explicit by design —
   asc and desc may use separately authored tiles, so rules never mirror-infer.
   End columns append their ABUTMENT signature: X = outward neighbour on the
   cell's own row, Y = outward neighbour one row toward the run's support;
   'o' = open air, 'f' = ground (fills + auto-supports), 'p' = another slope.
   A base over a ledge (oo), a base landing on floor (of), and a tip meeting
   an opposing slope (pp) are all DIFFERENT joints with separate rules.
   SOLO columns (1-step runs — corner connectors) are open and base at once:
   for multi-column runs the low side is always more run, but a solo's low
   side is whatever the world provides. They append a SECOND pair (ZW) probing
   the low side, so solo joints never share rule slots with tips of longer
   runs — a corner connector and a wall-truncating tip are different joints. */
const slopeRole = (cells, c, r, v) => {
  let key = v.face + ":" + v.runKey + ":" + v.runDir + ":" + v.part;
  if (v.end) {
    const dx = (v.runDir === "asc" ? 1 : -1) * (v.face === "c" ? -1 : 1) * (v.end === "base" ? -1 : 1);
    const dy = v.face === "c" ? -1 : 1;
    const o = (ddx, ddy) => { const n = cells[K(c + ddx, r + ddy)]; return !n ? "o" : n.kind === "slope" ? "p" : "f"; };
    key += ":" + v.end + ":" + o(dx, 0) + o(dx, dy) + (v.solo ? o(-dx, 0) + o(-dx, dy) : "") + ":" + o(dx, -dy);
    // ^ 7th segment (v6.20): beyond-tip at the SURFACE row — distinguishes a
    //   valley bridge (air, "o") from a plateau shoulder (fill, "f")
  }
  return key;
};

/* Slope run -> cells. (c,r) is the SURFACE cell of the LEFTMOST column;
   'asc' surface rises as x increases (matches ATLAS drag semantics).
   Ceilings (face 'c') follow the v22.2 contract, settled numerically in
   ATLAS: INVERT the stamp direction (vertical flip mirrors each piece's
   diagonal), do NOT reverse column order, stack cells UPWARD, draw V-flipped. */
function expandSlopeRun(run, ct) {
  const face = run.face || "f";
  const mirror = !!ct.MIRROR_SLOPES;
  const gradKey = "slope_" + (run.grad === 1 ? "45" : run.grad === 2 ? "2to1" : "3to1");
  // mirrored contracts: asc art is authored; desc = columns reversed + H-flip.
  // legacy contracts keep per-direction art and the v22.2 flipped-floor ceilings.
  const dedicated = face === "c" && !!ct.CEIL_SLOPE_STAMPS;
  const stampDir = (face === "c" && !dedicated) ? (run.dir === "asc" ? "desc" : "asc") : run.dir;
  const runKey = mirror ? gradKey : TERR_SLOPE_KEYS[run.grad + "," + stampDir];
  const stamps = (dedicated ? ct.CEIL_SLOPE_STAMPS : ct.SLOPE_STAMPS)[runKey];
  const flipH = mirror && run.dir === "desc";
  const out = {};
  const cols = run.steps * run.grad;
  const baseGroup = (face === "c") === (run.dir === "asc") ? run.steps - 1 : 0;
  // open end = the vertical extreme pointing away from support: floor tip is
  // its highest column, ceiling tip its lowest-hanging one
  const openJ = (face === "c") === (run.dir === "asc") ? 0 : cols - 1;
  for (let j = 0; j < cols; j++) {
    const group = Math.floor(j / run.grad);
    const rr = run.r + (run.dir === "asc" ? -group : group);
    const sub = j % run.grad;
    const col = stamps[flipH ? run.grad - 1 - sub : sub];
    const baseEndJ = cols - 1 - openJ;
    col.forEach((cell, i) => {
      out[K(run.c + j, face === "c" ? rr - i : rr + i)] =
        { kind: "slope", part: i === 0 ? "s" : "u", face, ax: cell.ax, ay: cell.ay,
          flipV: face === "c" && !dedicated, flipH,
          seamBand: i > 0 && group === baseGroup,
          end: j === openJ ? "open" : (j === baseEndJ ? "base" : null),
          solo: cols === 1,
          runKey, runDir: run.dir };
    });
  }
  return out;
}

/* Neighbour mask — mirrors ATLAS terrMaskAt: slope SURFACE cells read as
   empty from their AIR side (a block above a floor ramp grows a bottom
   edge; mirrored for ceilings). Underlays are fully solid. */
function maskAt(cells, c, r, ct) {
  const on = (dx, dy) => {
    const v = cells[K(c + dx, r + dy)];
    if (!v) return false;
    if (v.kind === "slope" && v.part === "s") {
      if (v.face !== "c" && dy === 1) return false;
      if (v.face === "c" && dy === -1) return false;
      if (ct && ct.SLOPE_SIDE_AIR && dy === 0) {
        // truncating wall (column continues past the surface) sees air;
        // a same-level crest/attach sees solid and transitions smoothly
        const cont = v.face !== "c" ? cells[K(c, r - 1)] : cells[K(c, r + 1)];
        return !cont;
      }
    }
    return true;
  };
  return terrCanonicalMask(on(0,-1), on(1,-1), on(1,0), on(1,1), on(0,1), on(-1,1), on(-1,0), on(-1,-1));
}

/* Slopes must always sit on solid backing: walk each slope cell toward its
   support (down for floors, up for ceilings) and fill until existing content,
   the grid edge, or the cap. */
const SUPPORT_CAP = 2;
function addSlopeSupports(cells) {
  const add = {};
  for (const k of Object.keys(cells)) {
    const v = cells[k];
    if (v.kind !== "slope" || v.anchored) continue;
    const [c, r] = k.split(",").map(Number);
    const dir = v.face === "c" ? -1 : 1;
    // Probe first, commit second: supports exist to BRIDGE a shallow gap to
    // real backing. If the walk exhausts the cap without reaching existing
    // content or the level border, there is nothing to bridge — add nothing.
    // (A hanging stub under an open run is never right, and it poisons the
    // neighbouring masks: an island corner beside a stub reads as a wall
    // continuation instead of a corner. The run's own end treatments close
    // an overhanging column instead.)
    const gap = [];
    let grounded = false;
    for (let i = 1; i <= SUPPORT_CAP + 1; i++) {
      const rr = r + dir * i;
      if (rr < 0 || rr >= GROWS) { grounded = true; break; }   // border = backing
      const kk = K(c, rr);
      if (cells[kk] || add[kk]) { grounded = true; break; }
      if (gap.length >= SUPPORT_CAP) break;   // cap spent, nothing reached
      gap.push(kk);
    }
    if (grounded) for (const kk of gap) add[kk] = { t: 1, support: true };   // auto-scaffold, not real ground
  }
  Object.assign(cells, add);
  return cells;
}

/* Resolve every cell to a template address for the given contract — two
   passes so interior cells can see their neighbours' masks (the LDtk-style
   distance-2 rule; skipped when the contract has no rim). Slope cells were
   stamped at expansion time and are never re-resolved. */
function resolveAll(cells, ct) {
  const masks = {};
  for (const k of Object.keys(cells)) {
    if (cells[k].kind === "slope") continue;
    const [c, r] = k.split(",").map(Number);
    masks[k] = maskAt(cells, c, r, ct);
  }
  const out = {};
  for (const k of Object.keys(cells)) {
    const v = cells[k];
    if (v.kind === "slope") {
      let ax = v.ax, ay = v.ay;
      if (v.end && (ct.SLOPE_CAPS || ct.BASE_CAPS)) {
        const [c0, r0] = k.split(",").map(Number);
        const tipDx = (v.runDir === "asc" ? 1 : -1) * (v.face === "c" ? -1 : 1);

  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "v") { e.preventDefault(); doPaste(); return; }
  if (e.metaKey || e.ctrlKey) return;
  const k = e.key.toLowerCase();
  if (k === "b") setTool("pencil"); else if (k === "e") setTool("eraser");
  else if (k === "g") setTool("fill"); else if (k === "i") setTool("pick");
});

/* ---- palette UI ---- */
function refreshPalSelect() {
  const s = $("palSelect"); s.innerHTML = "";
  palettes.forEach((p, i) => { const o = document.createElement("option"); o.value = i; o.textContent = p.name; s.appendChild(o); });
  s.value = palIdx;
}
$("palSelect").addEventListener("change", (e) => {
  palIdx = parseInt(e.target.value, 10);
  pvDirty = true; renderPreview(); refreshSwatches(); syncColorChip();
  if (activeTab === "ed") blit();   // template recolors via edDisplay's stale key
  closeColorMenu();
  status(palettes[palIdx].base ? palettes[palIdx].name + " — display only; the template stays grayscale underneath." : "Grayscale — raw template values.");
});
/* .tres loader retired (v6.5) — zone palettes are baked into BUILTIN_PALETTES.
   parseTresPalette stays as the documented .tres shape for the ATLAS port. */

/* ---- contracts: each format keeps its own artboard, undo history, and
   autosave; switching stashes one and wakes the other ---- */
function setContract(id, opts) {
  if (CT && CT.id === id) return;
  if (CT) { boards[CT.id].undo = undoStack; boards[CT.id].redo = redoStack; }
  CT = CONTRACTS[id];
  const _ext = sheetSize[id] || {};
  TW = TILE * Math.max(CT.TCOLS, Math.min(26, _ext.cols || CT.TCOLS));
  TH = TILE * Math.max(CT.TROWS, Math.min(99, _ext.rows || CT.TROWS));
  WORLD.ed.w = TW; WORLD.ed.h = TH;
  let b = boards[id];
  if (!b) {
    const c = document.createElement("canvas"); c.width = TW; c.height = TH;
    b = boards[id] = { canvas: c, ctx: c.getContext("2d", { willReadFrequently: true }), undo: [], redo: [], loaded: false };
    b.ctx.imageSmoothingEnabled = false;
  }
  ed = b.canvas; edCtx = b.ctx;
  undoStack = b.undo; redoStack = b.redo;
  try { localStorage.setItem(LS.contract, id); } catch (e) {}
  $("ctSelect").value = id;
  hover = null;
  rebuild();
  fitView("ed");
  if (opts && opts.skipArtLoad) { b.loaded = true; return; }
  if (!b.loaded) {
    b.loaded = true;
    const saved = (() => { try { return localStorage.getItem(CT.lsKey); } catch (e) { return null; } })();
    loadPngIntoEditor(saved || DEFAULT_PNGS[id], saved ? `${CT.label} — restored your last session.` : `${CT.label} — loaded the shipped sheet.`, true);
  } else {
    refreshFileSwatches(); blit(); drawGrid(); renderPreview();
  }
}
$("ctSelect").addEventListener("change", (e) => { if (float) floatFlatten(); setContract(e.target.value); selClear(); });

/* Empty cap/ceiling cells get placeholder art copied from their source
   stamps, so sheets predating those features show editable duplicates
   instead of holes. Idempotent: any cell with pixels is left alone. */
function seedSpecialCells() {
  let n = 0;
  const empty = (ax, ay) => {
    const d = edCtx.getImageData(ax * TILE, ay * TILE, TILE, TILE).data;
    for (let i = 3; i < d.length; i += 4) if (d[i]) return false;
    return true;
  };
  const copy = (s, dax, day, flip, xform) => {
    edCtx.save();
    if (xform) {
      edCtx.translate(dax * TILE + TILE / 2, day * TILE + TILE / 2);
      if (xform.flipH) edCtx.scale(-1, 1);
      if (xform.rot) edCtx.rotate(Math.PI / 2 * xform.rot);
      edCtx.drawImage(ed, s.ax * TILE, s.ay * TILE, TILE, TILE, -TILE / 2, -TILE / 2, TILE, TILE);
    } else if (flip) {
      edCtx.translate(dax * TILE, day * TILE + TILE); edCtx.scale(1, -1);
      edCtx.drawImage(ed, s.ax * TILE, s.ay * TILE, TILE, TILE, 0, 0, TILE, TILE);
    } else {
      edCtx.translate(dax * TILE, day * TILE);
      edCtx.drawImage(ed, s.ax * TILE, s.ay * TILE, TILE, TILE, 0, 0, TILE, TILE);
    }
    edCtx.restore();
    n++;
  };
  if (CT.TIP45_UNDERLAY && CT.TIP45_RESERVED) {
    const Y = CT.TIP45_UNDERLAY.east, R = CT.TIP45_UNDERLAY.west;
    const Yf = CT.TIP45_RESERVED.floorY, Rc = CT.TIP45_RESERVED.ceilR;
    // heal the short-lived bad Yf seed (transposed Y) before the empty check
    const tmp = document.createElement("canvas"); tmp.width = TILE; tmp.height = TILE;
    const tc = tmp.getContext("2d"); tc.imageSmoothingEnabled = false;
    tc.translate(TILE / 2, TILE / 2); tc.scale(-1, 1); tc.rotate(Math.PI / 2);
    tc.drawImage(ed, Y.ax * TILE, Y.ay * TILE, TILE, TILE, -TILE / 2, -TILE / 2, TILE, TILE);
    const bad = tc.getImageData(-0 + 0, 0, TILE, TILE).data;
    const cur = edCtx.getImageData(Yf.ax * TILE, Yf.ay * TILE, TILE, TILE).data;
    let isBad = true;
    for (let i = 0; i < bad.length; i++) if (bad[i] !== cur[i]) { isBad = false; break; }
    if (isBad) { edCtx.clearRect(Yf.ax * TILE, Yf.ay * TILE, TILE, TILE); }
    if (empty(Yf.ax, Yf.ay)) copy(Y, Yf.ax, Yf.ay, true);   // flipV(Y) = corrected orientation
    if (empty(Rc.ax, Rc.ay)) copy(R, Rc.ax, Rc.ay, false, { flipH: true });
  }
  if (CT.SLOPE_CAPS) for (const [key, cap] of Object.entries(CT.SLOPE_CAPS)) {
    const fc = CT.SLOPE_STAMPS[key];
    if (cap.floor && empty(cap.floor.ax, cap.floor.ay)) copy(fc[fc.length - 1][0], cap.floor.ax, cap.floor.ay, false);
    if (cap.ceil && CT.CEIL_SLOPE_STAMPS && empty(cap.ceil.ax, cap.ceil.ay)) copy(CT.CEIL_SLOPE_STAMPS[key][0][0], cap.ceil.ax, cap.ceil.ay, false);
  }
  if (CT.CEIL_SLOPE_STAMPS && CT.MIRROR_SLOPES) for (const [key, cols] of Object.entries(CT.CEIL_SLOPE_STAMPS)) {
    const srcCols = CT.SLOPE_STAMPS[key];
    cols.forEach((col, j) => col.forEach((cell, i) => { if (empty(cell.ax, cell.ay)) copy(srcCols[j][i], cell.ax, cell.ay, true); }));
  }
  return n;
}

/* ---- file IO / persistence ---- */
function loadPngIntoEditor(src, note, noSwitch) {
  if (float) floatFlatten();
  const img = new Image();
  img.onload = () => {
    if (noSwitch === undefined) noSwitch = false;
    // Never format-hop when the sheet already fits the CURRENT contract —
    // 4x4 and 5x5 share 160x192, so dims alone can't distinguish them.
    if (!noSwitch && (img.width !== TW || img.height !== TH)) {
      const matches = Object.values(CONTRACTS).filter((ct) => ct.id !== CT.id && img.width === TILE * ct.TCOLS && img.height === TILE * ct.TROWS);
      if (matches.length === 1) {
        setContract(matches[0].id, { skipArtLoad: true });
        note = `${matches[0].label} sheet detected — switched format.`;
      } else if (matches.length > 1) {
        note = `Sheet is ${img.width}\u00d7${img.height} — matches multiple formats (${matches.map((m) => m.label).join(", ")}). Pick the right one from the dropdown.`;
      }
    }
    // Extended sheet of the CURRENT contract: clean cell multiples at or above
    // base dims are adopted as the working size (legacy 160\u00d7272 v3 excluded —
    // that's the old layout handled by the migration below).
    if ((img.width !== TW || img.height !== TH) && !(CT.id === "v3" && img.width === 160 && img.height === 272)) {
      const cw = img.width / TILE, rh = img.height / TILE;
      if (Number.isInteger(cw) && Number.isInteger(rh) && cw >= CT.TCOLS && rh >= CT.TROWS && cw <= 26 && rh <= 99) {
        applySheetDims(cw, rh);
        note = (note ? note + " " : "") + cw + "×" + rh + "-cell extended sheet adopted.";
      }
    }
    edCtx.clearRect(0, 0, TW, TH);
    if (CT.id === "v3" && img.height === 272) {
      // previous (per-direction) v3 layout: relocate the ascending art
      edCtx.drawImage(img, 0, 0, 160, 128, 0, 0, 160, 128);
      const mv = (sx, sy, dx, dy) => edCtx.drawImage(img, sx*TILE, sy*TILE, TILE, TILE, dx*TILE, dy*TILE, TILE, TILE);
      mv(0,8, 0,8); mv(0,9, 0,9); mv(2,8, 1,8); mv(2,9, 1,9); mv(3,8, 2,8); mv(3,9, 2,9);
      for (let i = 0; i < 3; i++) { mv(i,10, 3+i,8); mv(i,11, 3+i,9); }
      mv(0,13, 0,10); mv(0,14, 0,11); mv(2,13, 1,10); mv(2,14, 1,11); mv(3,13, 2,10); mv(3,14, 2,11);
      for (let i = 0; i < 3; i++) { mv(i,15, 3+i,10); mv(i,16, 3+i,11); }
      status("Old 5\u00d75 layout detected \u2014 ascending slope art migrated to the mirrored layout.");
    } else {
      edCtx.drawImage(img, 0, 0);
    }
    const seeded = seedSpecialCells();
    if (seeded) status(`Seeded ${seeded} placeholder cell${seeded > 1 ? "s" : ""} (caps/ceilings) — modify freely.`);
    if (img.width !== TW || img.height !== TH) status(`Note: image is ${img.width}\u00d7${img.height}, expected ${TW}\u00d7${TH} — drawn top-left.`);
    else if (note) status(note);
    undoStack = []; redoStack = [];
    refreshFileSwatches(); templateChanged(); persistPng();
  };
  img.src = src;
}
$("btnLoad").addEventListener("click", () => $("fileTpl").click());
$("fileTpl").addEventListener("change", (e) => {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader(); rd.onload = () => loadPngIntoEditor(rd.result, `Loaded ${f.name}.`); rd.readAsDataURL(f);
  e.target.value = "";
});
/* Export: on share-capable devices (iPad/iPhone) the native share sheet
   opens — Save Image lands the PNG in Photos. The blob is built
   SYNCHRONOUSLY from the data URL so navigator.share still runs inside
   the user-activation window (WebKit requirement; async toBlob loses it).
   Elsewhere, the classic anchor download. */
$("btnSave").addEventListener("click", () => {
  const url = ed.toDataURL("image/png");
  try {
    if (navigator.share && navigator.canShare) {
      const b64 = url.split(",")[1], bin = atob(b64), bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const file = new File([bytes], CT.filename, { type: "image/png" });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] })
          .then(() => status(`Shared ${CT.filename}.`))
          .catch((err) => { if (err && err.name !== "AbortError") status("Share failed: " + err.message); });
        return;
      }
    }
  } catch (e) {}   // any share-path surprise falls through to the download
  const a = document.createElement("a");
  a.href = url; a.download = CT.filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  status(`Saved ${CT.filename}.`);
});
function persistPng() { try { localStorage.setItem(CT.lsKey, ed.toDataURL("image/png")); } catch (e) {} }
function persistFills() { try { localStorage.setItem(LS.fills, JSON.stringify(Object.keys(fills))); } catch (e) {} }

/* ---- boot ---- */
window.addEventListener("resize", () => { sizeOverlay(); fitView("ed"); fitView("pv"); });
const APP_VERSION = "6.23.0";

/* ---- tooltips that work for Apple Pencil hover (native title bubbles are
   mouse-only): titles migrate to data-tip, a shared tip shows after 450ms ---- */
const tipEl = document.createElement("div"); tipEl.id = "tip"; document.body.appendChild(tipEl);
document.querySelectorAll("[title]").forEach((el) => { el.dataset.tip = el.getAttribute("title"); el.removeAttribute("title"); });
let tipT = null;
function showTip(el) {
  tipEl.textContent = el.dataset.tip;
  tipEl.style.display = "block"; tipEl.style.left = "0px"; tipEl.style.top = "0px";
  const r = el.getBoundingClientRect(), tr = tipEl.getBoundingClientRect();
  let x = Math.min(Math.max(6, r.left), window.innerWidth - tr.width - 6);
  let y = r.bottom + 6;
  if (y + tr.height > window.innerHeight - 6) y = r.top - tr.height - 6;
  tipEl.style.left = x + "px"; tipEl.style.top = y + "px";
}
function hideTip() { tipEl.style.display = "none"; }
document.addEventListener("pointerover", (e) => {
  const el = e.target.closest("[data-tip]");
  clearTimeout(tipT); hideTip();
  if (el) tipT = setTimeout(() => showTip(el), 450);
});
document.addEventListener("pointerout", () => { clearTimeout(tipT); hideTip(); });
document.addEventListener("pointerdown", () => { clearTimeout(tipT); hideTip(); }, true);
$("btnFinger").addEventListener("click", () => setFingerDraws(!fingerDraws));
/* BG flyout: one visible swatch shows the active background; tapping it opens
   the menu above; picking closes it; tapping anywhere else dismisses AND
   swallows that tap so dismissal never draws a stray pixel. */
function syncBgCurrent() { $("bgCurrent").dataset.bg = bgMode; }
function closeBgMenu() { $("bgMenu").style.display = "none"; $("bgCurrent").classList.remove("on"); }
$("bgCurrent").addEventListener("click", () => {
  const m = $("bgMenu");
  if (m.style.display === "flex") { closeBgMenu(); return; }
  const r = $("bgCurrent").getBoundingClientRect();
  m.style.left = r.left + "px";
  m.style.bottom = (window.innerHeight - r.top + 8) + "px";   // opens upward
  m.querySelectorAll(".bgo").forEach((q) => q.classList.toggle("on", q.dataset.bg === bgMode));
  m.style.display = "flex";
  $("bgCurrent").classList.add("on");
});
document.querySelectorAll("#bgMenu .bgo").forEach((b) => b.addEventListener("click", () => {
  bgMode = b.dataset.bg;
  try { localStorage.setItem(LS.bg, bgMode); } catch (e) {}
  syncBgCurrent(); closeBgMenu(); blit();
}));
document.addEventListener("pointerdown", (e) => {
  const m = $("bgMenu");
  if (m.style.display !== "flex") return;
  if (m.contains(e.target) || e.target === $("bgCurrent")) return;
  closeBgMenu();   // outside tap closes AND proceeds
}, true);
/* Options flyout: wrench toggles; items act via their original handlers and
   close the menu; outside taps dismiss and are swallowed. */
function closeOptMenu() {
  const b = $("optbar");
  if (b.style.display === "flex") { b.style.display = "none"; sizeOverlay(); }
  $("btnOptions").classList.remove("on");
}
$("btnOptions").addEventListener("click", () => {
  const b = $("optbar");
  if (b.style.display === "flex") { closeOptMenu(); return; }
  closeColorMenu(); closeBrushMenu();
  b.style.display = "flex"; sizeOverlay();
  $("btnOptions").classList.add("on");
});
document.querySelectorAll("#optbar .optline").forEach((b) => b.addEventListener("click", () => closeOptMenu()));
$("btnReload").addEventListener("click", () => {
  if (float) floatFlatten();
  persistPng();   // belt and suspenders — the sheet is already persisted per stroke
  location.replace(location.pathname + "?u=" + Date.now());   // unique query defeats the HTTP cache
});
$("btnCanvas").addEventListener("click", () => {
  if (activeTab !== "ed") setTab("ed");   // the sheet lives on the Template tab
  canvasMode = true;
  drawGrid();
  status("Canvas mode — drag the right or bottom handle to resize in 16px cells (min " + CT.TCOLS + "×" + CT.TROWS + "). Tap anywhere else to finish.");
});

/* Brush flyout: slider + shape pair; settings persist and apply to both
   pencil and eraser immediately. */
function closeBrushMenu() { $("brushMenu").style.display = "none"; $("btnBrush").classList.remove("on"); }
$("btnBrush").addEventListener("click", () => {
  const m = $("brushMenu");
  if (m.style.display === "flex") { closeBrushMenu(); return; }
  closeColorMenu(); closeOptMenu();
  $("brushSizeSlider").value = brushSize; $("brushSizeVal").textContent = brushSize;
  document.querySelectorAll(".bshape").forEach((q) => q.classList.toggle("on", q.dataset.bshape === brushShape));
  m.style.top = ($("btnBrush").getBoundingClientRect().bottom + 8) + "px";   // vertical only — right edge is CSS-pinned to the screen margin
  m.style.display = "flex";
  $("btnBrush").classList.add("on");
});
$("brushSizeSlider").addEventListener("input", (e) => {
  brushSize = Math.max(1, Math.min(16, parseInt(e.target.value, 10) || 1));
  $("brushSizeVal").textContent = brushSize;
  persistBrush();
});
document.querySelectorAll(".bshape").forEach((b) => b.addEventListener("click", () => {
  brushShape = b.dataset.bshape;
  document.querySelectorAll(".bshape").forEach((q) => q.classList.toggle("on", q === b));
  persistBrush();
}));
document.addEventListener("pointerdown", (e) => {
  const m = $("brushMenu");
  if (m.style.display !== "flex") return;
  if (m.contains(e.target) || $("btnBrush").contains(e.target)) return;
  closeBrushMenu();   // outside tap closes AND proceeds — a canvas tap starts its stroke
}, true);

/* Color flyout: the chip shows the in-use color through the active palette;
   tapping opens stops + file colors + the palette picker. Outside taps close
   AND are swallowed, so dismissing over the canvas never draws. */
function syncColorChip() { $("colorCurrent").style.background = displayColor(color); }
function closeColorMenu() { $("colorMenu").style.display = "none"; $("colorCurrent").classList.remove("on"); }
$("colorCurrent").addEventListener("click", () => {
  const m = $("colorMenu");
  if (m.style.display === "flex") { closeColorMenu(); return; }
  closeOptMenu(); closeBrushMenu();
  refreshSwatches();   // file colors may have changed since last open
  m.style.top = ($("colorCurrent").getBoundingClientRect().bottom + 8) + "px";   // vertical only — right edge is CSS-pinned to the screen margin
  m.style.display = "flex";
  $("colorCurrent").classList.add("on");
});
document.addEventListener("pointerdown", (e) => {
  const m = $("colorMenu");
  if (m.style.display !== "flex") return;
  if (m.contains(e.target) || e.target === $("colorCurrent")) return;
  closeColorMenu();   // outside tap closes AND proceeds
}, true);
/* CONVERT: snap every opaque template pixel to the nearest stop gray by
   luminance. One snapshot = one undo step; the refresh afterwards hides the
   IN FILE row when the sheet conforms. */
$("btnConvert").addEventListener("click", () => {
  snapshot();
  const img = edCtx.getImageData(0, 0, TW, TH), d = img.data;
  let n = 0;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i + 3] === 0) continue;
    const l = Math.round(d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
    let best = STOP_GRAYS[0];
    for (const g of STOP_GRAYS) if (Math.abs(g - l) < Math.abs(best - l)) best = g;
    if (d[i] !== best || d[i+1] !== best || d[i+2] !== best) { d[i] = d[i+1] = d[i+2] = best; n++; }
  }
  if (!n) { undoStack.pop(); actionLog.pop(); refreshFileSwatches(); status("Already conforming \u2014 nothing to change."); return; }
  edCtx.putImageData(img, 0, 0);
  templateChanged(); persistPng(); refreshFileSwatches();
  status(n + " pixel" + (n > 1 ? "s" : "") + " snapped to the nearest stop gray \u2014 undo to revert.");
});

(function boot() {
  $("ver").textContent = "v" + APP_VERSION;
  try {
    penSeen = localStorage.getItem(LS.pen) === "1";
    const f = localStorage.getItem(LS.finger);
    fingerDraws = f === null ? !penSeen : f === "1";
    const bg = localStorage.getItem(LS.bg);
    if (bg && BG_STYLES[bg]) bgMode = bg;
    const br = JSON.parse(localStorage.getItem(LS.brush) || "null");
    if (br) {
      brushSize = Math.max(1, Math.min(16, br.size | 0)) || 1;
      if (br.shape === "circle" || br.shape === "square") brushShape = br.shape;
    }
  } catch (e) {}
  syncBgCurrent();
  syncColorChip();
  $("btnFinger").classList.toggle("on", fingerDraws);
  buildStopSwatches();
  try {
    const savedPals = JSON.parse(localStorage.getItem(LS.pals) || "[]");
    for (const p of savedPals) if (p && p.base && !palettes.some((q) => q.name === p.name)) palettes.push(p);
  } catch (e) {}
  refreshPalSelect();
  try {
    const savedFills = JSON.parse(localStorage.getItem(LS.fills) || "null");
    if (savedFills && savedFills.length) { fills = {}; for (const k of savedFills) fills[k] = { t: 1 }; }
  } catch (e) {}
  if (!fills) fills = buildDefaultFills();
  try {
    if (localStorage.getItem(LS.slopes) === null) { userSlopes = JSON.parse(JSON.stringify(DEFAULT_SLOPES)); persistUserSlopes(); }
    else if (localStorage.getItem("tessera.migr_defslopes") === null) { userSlopes = JSON.parse(JSON.stringify(DEFAULT_SLOPES)).concat(userSlopes); persistUserSlopes(); }
    localStorage.setItem("tessera.migr_defslopes", "1");
  } catch (e) {}
  // v5.0: pin-era data is never salvaged or seeded — rules exist only if
  // taught against the current resolver. Stale keys are simply removed.
  // v5.2: DEFAULT_ROLE_RULES / DEFAULT_MASK_REMAPS honor that stance — they
  // WERE taught against this resolver, and they seed only a virgin store.
  try { localStorage.removeItem("tessera.overrides"); localStorage.removeItem("tessera.migr_fieldpins"); localStorage.removeItem("tessera.sloperemaps"); } catch (e) {}
  // v5.7.1 one-time repair (James, 2026-07-13): the two fossil H2 tip rules.
  // Rewrites a stored rule ONLY if it still targets H2 (7,1) verbatim — any
  // re-taught association is left alone. Remove this block in a future pass.
  try {
    const rr = roleRemaps.v3;
    const fix = {
      "f:slope_2to1:desc:u:open:ff": { ax: 2, ay: 9, flipH: true },
      "f:slope_3to1:desc:u:open:ff": { ax: 5, ay: 9, flipH: true },
    };
    let changed = false;
    for (const kk of Object.keys(fix)) {
      const cur = rr && rr[kk];
      if (cur && cur.ax === 7 && cur.ay === 1 && !cur.flipH && !cur.flipV && !cur.rot) { rr[kk] = fix[kk]; changed = true; }
    }
    if (changed) persistRoleRemaps();
  } catch (e) {}
  let choice = "v1";   // 3x3 (the production ATLAS contract) unless a prior session chose otherwise
  try { const c = localStorage.getItem(LS.contract); if (c && CONTRACTS[c]) choice = c; } catch (e) {}
  setContract(choice);
  sizeOverlay(); fitView("pv");
})();
